name = "poe-skins"
main = "worker/index.js"
compatibility_date = "2025-05-01"

[assets]
directory = "./dist"
binding = "ASSETS"

[[routes]]
pattern = "fungamingvn.shop/*"
zone_name = "fungamingvn.shop"

[[routes]]
pattern = "www.fungamingvn.shop/*"
zone_name = "fungamingvn.shop"

# D1 database for stored mail accounts.
# One-time setup:
#   wrangler d1 create twitch-mail        # paste returned database_id below
#   wrangler d1 execute twitch-mail --file=./schema.sql           # remote
#   wrangler d1 execute twitch-mail --local --file=./schema.sql   # local dev
[[d1_databases]]
binding = "DB"
database_name = "twitch-mail"
database_id = "4c0a7f5f-b84c-47ca-b7af-1f3ffb595746"

# Rate limiter for /api/* — 5 requests per 10 seconds per (IP, path).
# namespace_id is any unique integer within this Worker; no external setup required.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 10 }
